name: backfill-kalshi-quotes-daily

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      start:
        description: "First obs_date to backfill (YYYY-MM-DD). Defaults to yesterday (UTC)."
        required: false
      end:
        description: "Last obs_date to backfill (YYYY-MM-DD). Defaults to yesterday (UTC)."
        required: false

concurrency:
  group: weather-db
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -e .

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDP }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Download canonical DB (tolerate first-run absence)
        run: |
          mkdir -p data
          gcloud storage cp "gs://${{ vars.GCP_BUCKET }}/weather.duckdb" data/weather.duckdb || true

      - name: Compute obs_date range (defaults to yesterday, UTC)
        id: date
        run: |
          start="${{ inputs.start }}"
          end="${{ inputs.end }}"
          yesterday="$(date -u -d yesterday +%F)"
          echo "start=${start:-$yesterday}" >> "$GITHUB_OUTPUT"
          echo "end=${end:-$yesterday}" >> "$GITHUB_OUTPUT"

      - name: Run backfill
        env:
          NWS_CONTACT_EMAIL: ${{ secrets.NWS_CONTACT_EMAIL }}
          APP_NAME: kalshi-weather
          DUCKDB_PATH: data/weather.duckdb
        run: |
          kalshi-weather backfill kalshi-quotes \
            --start "${{ steps.date.outputs.start }}" \
            --end "${{ steps.date.outputs.end }}" \
            --period 1

      - name: Upload updated DB
        run: gcloud storage cp data/weather.duckdb "gs://${{ vars.GCP_BUCKET }}/weather.duckdb"
